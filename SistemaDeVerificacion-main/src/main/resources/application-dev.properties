spring.application.name=SistemaDeVerificacion
server.port=8080
server.address=0.0.0.0
token.secret=${JWT_SECRET}
token.expiration.hours=${JWT_EXPIRATION_HOURS:2}
qr.token.secret=${QR_SECRET}
qr.token.expiration.minutes=5
#BASE DE DATOS
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/proyecto_seguridad}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create


#ESTATICOS
spring.web.resources.static-locations=file:/home/matias/pruebas/**
spring.mvc.static-path-pattern=/images/** , /spreadsheets/**

#EMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#MERCADOPAGO
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.sponsor.id=${MERCADOPAGO_SPONSOR_ID}

mercadopago.back.success.url=${APP_BASE_URL:https://248b9bfe35dc.ngrok-free.app}/v1/mercadopago/success
mercadopago.back.pending.url=${APP_BASE_URL:https://248b9bfe35dc.ngrok-free.app}/v1/mercadopago/pending
mercadopago.back.failure.url=${APP_BASE_URL:https://248b9bfe35dc.ngrok-free.app}/v1/mercadopago/failure
mercadopago.auto.return=approved
mercadopago.notification.path=/v1/mercadopago/notifications

#SUPABASE
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=files
